[supervisord]
nodaemon=true
logfile=/var/log/progeo/supervisord.log
logfile_maxbytes=15MB
pidfile=/run/supervisord.pid
childlogdir=/var/log/progeo

[program:cron]
command=/usr/sbin/crond -f -l 5 -L /var/log/progeo/cron.log -c /etc/crontabs
stdout_logfile=/var/log/progeo/cron-supervisor.log
stdout_logfile_maxbytes=15MB
stderr_logfile=/var/log/progeo/cron-supervisor.err.log
stderr_logfile_maxbytes=15MB
user=root
autostart=true
autorestart=true
priority=10
startsecs=0

[program:run-server]
command=/bin/bash -c "set -o pipefail; /bin/bash /usr/src/app/run-server.sh %(ENV_PORT)s 2>&1 | tee -a /var/log/progeo/backend.log"
user=progeo
autostart=true
autorestart=true
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true

[program:celery-worker]
command=/bin/bash -c "set -o pipefail; cd /usr/src/app; . /etc/profile; . ${VENV_ROOT:-/opt/venv}/bin/activate; celery -A progeo.celery worker --loglevel=info -E 2>&1 | tee -a /var/log/progeo/celery.log"
user=progeo
autostart=true
autorestart=true
startsecs=5
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true
