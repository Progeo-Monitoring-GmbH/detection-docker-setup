[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/run/supervisord.pid
childlogdir=/tmp

[program:cron]
command = /usr/sbin/crond -f -l 8 -L /dev/stdout -c /etc/crontabs
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes=0
user = root
autostart = true
autorestart = true
priority = 10
startsecs = 0

[program:run-server]
command = /bin/bash /usr/src/app/run-server.sh 8383
user = progeo
autostart = true
autorestart = true
startsecs = 5
priority = 20
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes=0
stopasgroup = true
killasgroup = true
