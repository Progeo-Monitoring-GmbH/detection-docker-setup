[tool:pytest]
python_files = tests.py test_*.py *_tests.py
log_cli = True
log_level = DEBUG
log_format = %(asctime)s %(levelname)s %(message)s
log_file = progeo/tests/_pytest.log
log_date_format = %Y-%m-%d %H:%M:%S
;--reuse-db --no-migrations --no-header --full-page-screenshot --setup-show --cov=. --cov-report html --ds=progeo.tests.settings
markers =
    requests
    sql
    sftp


[coverage:report]
ignore_errors = True
show_missing = True
skip_empty = True
exclude_also =
    if __name__ == "__main__":
    except IOError:
    def __str__

omit =
    dev.py
    */migrations/*
    */wsgi.py
    */asgi.py


[coverage:html]
directory = coverage_html_report


[coverage:run]
omit =
    progeo/tests/*


[playwright:codegen]
timezone = "Europe/Berlin"
addopts = --full-page-screenshot

